<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Auto-Slider</title>
    <style>
        /* Reset basic margins and padding */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #f4f4f9;
            /* Center the slider vertically for demo purposes */
            display: flex;
            align-items: center;
            min-height: 100vh; 
        }

        /* * SLIDER CONTAINER
         * Sets the max dimensions and uses aspect-ratio to ensure 
         * perfect responsiveness across all screen sizes.
         */
        .slider-container {
            width: 100%;
            max-width: 2880px;
            /* 2880 / 544 maintains your exact required proportions */
            aspect-ratio: 2880 / 544; 
            margin: 0 auto;
            overflow: hidden;
            position: relative;
            background-color: #ddd; /* Fallback while images load */
        }

        /* * SLIDER WRAPPER 
         * Holds all slides in a row. Width is handled dynamically by JS.
         */
        .slider-wrapper {
            display: flex;
            height: 100%;
            /* Smooth transition effect for the sliding motion */
            transition: transform 0.8s ease-in-out; 
        }

        /* * INDIVIDUAL SLIDE
         * Width is handled dynamically by JS based on total slide count.
         */
        .slide {
            height: 100%;
            flex-shrink: 0; 
        }

        .slide img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Ensures images fill the space without distortion */
            display: block;
        }
    </style>
</head>
<body>

    <div class="slider-container">
        <div class="slider-wrapper">
            <div class="slide"><img src="https://picsum.photos/seed/slide1/2880/544" alt="Demo Image 1"></div>
            <div class="slide"><img src="https://picsum.photos/seed/slide2/2880/544" alt="Demo Image 2"></div>
            <div class="slide"><img src="https://picsum.photos/seed/slide3/2880/544" alt="Demo Image 3"></div>
            <div class="slide"><img src="https://picsum.photos/seed/slide4/2880/544" alt="Demo Image 4"></div>
            <div class="slide"><img src="https://picsum.photos/seed/slide5/2880/544" alt="Demo Image 5"></div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const wrapper = document.querySelector('.slider-wrapper');
            const slides = document.querySelectorAll('.slide');
            const totalSlides = slides.length;
            let currentIndex = 0;

            // 1. Dynamically set the wrapper and slide widths based on the number of images
            // For 5 images, wrapper becomes 500% wide, each slide becomes 20% wide.
            wrapper.style.width = `${totalSlides * 100}%`;
            slides.forEach(slide => {
                slide.style.width = `${100 / totalSlides}%`;
            });

            // 2. Function to handle the auto-sliding logic
            function slideNext() {
                // Increment index, loop back to 0 if we hit the end
                currentIndex = (currentIndex + 1) % totalSlides;
                
                // Calculate how far to shift the wrapper to the left
                const shiftPercentage = (100 / totalSlides) * currentIndex;
                
                // Apply the transform
                wrapper.style.transform = `translateX(-${shiftPercentage}%)`;
            }

            // 3. Set the interval for auto-sliding (3500ms = 3.5 seconds)
            setInterval(slideNext, 3500);
        });
    </script>

</body>
</html>
