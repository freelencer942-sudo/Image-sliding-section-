<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Auto-Slider</title>
    <style>
        :root {
            --slide-delay: 4000ms; /* 4 seconds per slide */
            --transition-speed: 0.8s;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #f4f4f9;
            display: flex;
            align-items: center;
            min-height: 100vh; 
        }

        /* * SLIDER CONTAINER */
        .slider-container {
            width: 100%;
            max-width: 2880px;
            aspect-ratio: 2880 / 544; 
            margin: 0 auto;
            overflow: hidden;
            position: relative;
            background-color: #111; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.15); /* Advanced styling */
        }

        /* * SLIDER WRAPPER 
         * will-change informs the browser to optimize for transform animations
         */
        .slider-wrapper {
            display: flex;
            height: 100%;
            will-change: transform; 
        }

        /* * INDIVIDUAL SLIDE
         * flex: 0 0 100% strictly forces each slide to be exactly container width
         */
        .slide {
            flex: 0 0 100%;
            height: 100%;
            position: relative;
        }

        .slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            /* Optional: slight zoom effect for a premium feel */
            animation: slowZoom 10s ease-in-out infinite alternate;
        }

        @keyframes slowZoom {
            0% { transform: scale(1); }
            100% { transform: scale(1.05); }
        }

        /* * PROGRESS BAR
         * Gives users feedback on the timing without needing UI buttons
         */
        .progress-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 5px;
            background: rgba(255, 255, 255, 0.7);
            width: 0%;
            z-index: 10;
        }

        /* The animation class applied via JS */
        .progress-active {
            animation: fillProgress var(--slide-delay) linear infinite;
        }

        @keyframes fillProgress {
            0% { width: 0%; }
            100% { width: 100%; }
        }
    </style>
</head>
<body>

    <div class="slider-container" id="sliderContainer">
        <div class="slider-wrapper" id="sliderWrapper">
            <div class="slide"><img src="https://picsum.photos/id/1015/2880/544" alt="Landscape 1"></div>
            <div class="slide"><img src="https://picsum.photos/id/1018/2880/544" alt="Landscape 2"></div>
            <div class="slide"><img src="https://picsum.photos/id/1016/2880/544" alt="Landscape 3"></div>
            <div class="slide"><img src="https://picsum.photos/id/1021/2880/544" alt="Landscape 4"></div>
        </div>
        <div class="progress-bar" id="progressBar"></div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('sliderContainer');
            const wrapper = document.getElementById('sliderWrapper');
            const progressBar = document.getElementById('progressBar');
            let slides = document.querySelectorAll('.slide');
            
            const originalSlideCount = slides.length;
            const delay = 4000; // Must match CSS --slide-delay
            let currentIndex = 0;
            let slideInterval;

            // 1. ADVANCED: Clone the first slide and append it to the end for a seamless infinite loop
            const firstClone = slides[0].cloneNode(true);
            wrapper.appendChild(firstClone);
            
            // 2. Core Sliding Logic using translate3d for GPU acceleration
            function moveToNextSlide() {
                currentIndex++;
                wrapper.style.transition = 'transform 0.8s ease-in-out';
                // Using translate3d(x, y, z) enables hardware acceleration
                wrapper.style.transform = `translate3d(-${currentIndex * 100}%, 0, 0)`;
            }

            // 3. ADVANCED: Listen for the end of the transition
            // If we've slid to the cloned slide, instantly jump back to the REAL first slide invisibly
            wrapper.addEventListener('transitionend', () => {
                if (currentIndex === originalSlideCount) {
                    wrapper.style.transition = 'none'; // Turn off animation
                    currentIndex = 0; // Reset index
                    wrapper.style.transform = `translate3d(0, 0, 0)`; // Jump to start
                }
            });

            // 4. Start the auto-slide and progress bar
            function startSlider() {
                slideInterval = setInterval(moveToNextSlide, delay);
                progressBar.classList.add('progress-active');
                progressBar.style.animationPlayState = 'running';
            }

            // 5. Pause the auto-slide and progress bar
            function pauseSlider() {
                clearInterval(slideInterval);
                progressBar.style.animationPlayState = 'paused';
            }

            // Event Listeners for Pause on Hover / Touch
            container.addEventListener('mouseenter', pauseSlider);
            container.addEventListener('mouseleave', startSlider);
            container.addEventListener('touchstart', pauseSlider, {passive: true});
            container.addEventListener('touchend', startSlider, {passive: true});

            // Initialize
            startSlider();
        });
    </script>

</body>
    </html>
